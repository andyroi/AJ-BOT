<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ Bot</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lightweight markdown parser so AI responses render nicely -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Firebase SDKs (compat versions for simple script-tag usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

    <!-- ── Auth Screen (shown when logged out) ──────────────── -->
    <div class="auth-screen" id="auth-screen">
        <!-- Gradient blobs (matches landing page) -->
        <div class="auth-blur" aria-hidden="true">
            <div class="auth-blob auth-blob-1"></div>
            <div class="auth-blob auth-blob-2"></div>
            <div class="auth-blob auth-blob-3"></div>
        </div>

        <!-- Back to homepage -->
        <a href="index.html" class="back-home-btn" title="Back to home">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            Home
        </a>

        <div class="auth-card">
            <div class="auth-logo">AJ</div>
            <h2 id="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to chat with AJ Bot</p>

            <form id="auth-form" autocomplete="off">
                <div class="formField">
                    <input type="email" id="auth-email" autocomplete="username" required>
                    <span>Email</span>
                </div>
                <div class="formField">
                    <input type="password" id="auth-password" autocomplete="current-password" required>
                    <span>Password</span>
                </div>
                <button type="submit" id="auth-submit">Log In</button>
            </form>

            <p class="auth-error" id="auth-error"></p>
            <button class="auth-toggle" id="auth-toggle">Don't have an account? Sign up</button>
        </div>
    </div>

    <!-- ── Chat backdrop blobs (visible behind chat app) ────── -->
    <div class="chat-blur" id="chat-blur" aria-hidden="true">
        <div class="chat-blob chat-blob-1"></div>
        <div class="chat-blob chat-blob-2"></div>
        <div class="chat-blob chat-blob-3"></div>
    </div>

    <!-- ── Chat App (shown when logged in) ──────────────────── -->
    <div class="app-layout" id="chat-app" style="display: none;">

        <!-- Sidebar: conversation list + new chat button -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
                <div class="sidebar-header-actions">
                    <button id="new-chat-btn" class="new-chat-btn" title="New chat">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <button id="collapse-btn" class="collapse-btn" title="Collapse sidebar">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="11 17 6 12 11 7"></polyline>
                            <polyline points="18 17 13 12 18 7"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="conversation-list" id="conversation-list">
                <!-- Conversation tabs populated by JS -->
            </div>
        </aside>

        <!-- Main chat panel -->
        <div class="chat-container">
            <!-- Header -->
            <div class="chat-header">
                <!-- Sidebar toggle for mobile -->
                <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="avatar">AJ</div>
                <div class="header-info">
                    <h1>AJ Bot</h1>
                    <span>Online</span>
                </div>
                <!-- Back to homepage -->
                <a href="index.html" class="home-btn" title="Back to home">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
                <!-- Logout button -->
                <button id="logout-btn" class="logout-btn" title="Log out">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>

            <!-- Chat Messages -->
            <div id="chat-box">
                <div class="welcome" id="welcome">
                    <h2>Hello!</h2>
                    <p>Ask me about finance, gaming, anime, or life advice.</p>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing">
                <span></span><span></span><span></span>
            </div>

            <!-- Input Bar -->
            <div class="input-bar">
                <input type="text" id="input-box" placeholder="Message AJ Bot…" autocomplete="off">
                <button id="send-btn" aria-label="Send">
                    <svg viewBox="0 0 24 24">
                        <line x1="12" y1="19" x2="12" y2="5"></line>
                        <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts: auth first (sets up Firebase + login), then chat (uses getAuthToken) -->
    <script src="auth.js"></script>
    <script src="chat.js"></script>
</body>
</html>
